<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopEZ | Checkout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">ShopEZ</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
          <li class="nav-item"><a class="nav-link" href="cart.html">Cart <span id="cartCount" class="badge bg-warning text-dark">0</span></a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-5">
    <div class="row g-4">
      <div class="col-lg-7">
        <h1 class="mb-4 section-title">Checkout</h1>
        <form id="checkoutForm" class="card p-4 shadow-sm">
          <div class="row g-3">
            <div class="col-md-6">
              <label for="customerName" class="form-label">Full Name</label>
              <input type="text" class="form-control" id="customerName" required>
            </div>
            <div class="col-md-6">
              <label for="customerPhone" class="form-label">Phone Number</label>
              <input type="tel" class="form-control" id="customerPhone" required>
            </div>
          </div>

          <div class="mt-3">
            <label for="customerEmail" class="form-label">Email</label>
            <input type="email" class="form-control" id="customerEmail" required>
          </div>

          <div class="mt-3">
            <label for="customerAddress" class="form-label">Street Address</label>
            <textarea class="form-control" id="customerAddress" rows="4" required></textarea>
          </div>

          <div class="row g-3 mt-1">
            <div class="col-md-6">
              <label for="customerCity" class="form-label">City</label>
              <input type="text" class="form-control" id="customerCity" required>
            </div>
            <div class="col-md-3">
              <label for="customerState" class="form-label">State</label>
              <input type="text" class="form-control" id="customerState" required>
            </div>
            <div class="col-md-3">
              <label for="customerPincode" class="form-label">Pincode</label>
              <input type="text" class="form-control" id="customerPincode" required>
            </div>
          </div>

          <div class="mt-3">
            <label for="paymentMethod" class="form-label">Payment Method</label>
            <select id="paymentMethod" class="form-select" required>
              <option value="">Select payment method</option>
              <option>Cash on Delivery</option>
              <option>Credit / Debit Card</option>
              <option>UPI</option>
              <option>Net Banking</option>
            </select>
          </div>

          <button type="submit" class="btn btn-dark mt-4">Place Order</button>
        </form>
      </div>
      <div class="col-lg-5">
        <h2 class="mb-4 section-title">Order Summary</h2>
        <div id="checkoutSummary" class="card p-3 shadow-sm"></div>
      </div>
    </div>
  </main>

  <footer class="bg-dark text-white text-center py-3">
    <p class="mb-0">&copy; 2026 ShopEZ. All rights reserved.</p>
  </footer>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/common.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
