<!DOCTYPE html>
<html>
<head>

<title>E-Commerce Landing Page</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<!-- Navbar with Offcanvas -->
<nav class="navbar navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand">ShopZone</a>

<button class="btn btn-outline-light" data-bs-toggle="offcanvas" data-bs-target="#menu">
Menu
</button>

</div>
</nav>

<!-- Offcanvas -->
<div class="offcanvas offcanvas-start" id="menu">

<div class="offcanvas-header">
<h5>Categories</h5>
<button class="btn-close" data-bs-dismiss="offcanvas"></button>
</div>

<div class="offcanvas-body">

<ul class="list-group">
<li class="list-group-item">Electronics</li>
<li class="list-group-item">Fashion</li>
<li class="list-group-item">Accessories</li>
</ul>

</div>
</div>

<!-- Carousel -->
<div id="carouselExample" class="carousel slide" data-bs-ride="carousel">

<div class="carousel-inner">

<div class="carousel-item active">
<img src="https://via.placeholder.com/1200x400" class="d-block w-100">
</div>

<div class="carousel-item">
<img src="https://via.placeholder.com/1200x400" class="d-block w-100">
</div>

<div class="carousel-item">
<img src="https://via.placeholder.com/1200x400" class="d-block w-100">
</div>

</div>

<button class="carousel-control-prev" data-bs-target="#carouselExample" data-bs-slide="prev">
<span class="carousel-control-prev-icon"></span>
</button>

<button class="carousel-control-next" data-bs-target="#carouselExample" data-bs-slide="next">
<span class="carousel-control-next-icon"></span>
</button>

</div>

<!-- Products Section -->
<section class="py-5">
<div class="container">

<h2 class="text-center mb-4">Featured Products</h2>

<div class="row g-4">

<div class="col-md-4">
<div class="card">
<img src="https://via.placeholder.com/300" class="card-img-top">
<div class="card-body text-center">
<h5>Headphones</h5>
<button class="btn btn-primary">Buy Now</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<img src="https://via.placeholder.com/300" class="card-img-top">
<div class="card-body text-center">
<h5>Camera</h5>
<button class="btn btn-primary">Buy Now</button>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card">
<img src="https://via.placeholder.com/300" class="card-img-top">
<div class="card-body text-center">
<h5>Smartphone</h5>
<button class="btn btn-primary">Buy Now</button>
</div>
</div>
</div>

</div>
</div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
