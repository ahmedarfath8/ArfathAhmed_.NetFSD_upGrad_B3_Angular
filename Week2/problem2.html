<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Live Form Validation </title>
    </head>
    <body>
        <h1>Live Form Validation </h1>
        <label for="name">Enter Name : </label>
        <input type="text" id="name" name="name" onchange="validateName()"><span id="p1"> </span>
        <br>
        <label for="email">Enter Email : </label>
        <input type="email" id="email" name="email" onchange="validateEmail()"><span id="p2"> </span>
        <br>
        <label for="age">Enter Age : </label>
        <input type="number" name="age" id="age" onchange="validateAge()"><span id="p3"> </span>
        <br>
        <input type="button" value="submit" onclick="validateUser()"><p id="p4"></p>
        <script>
           function validateName(){
            if((document.getElementById("name").value).trim()==""){
                document.getElementById("p1").textContent="Invalid Name"
           }else{
                document.getElementById("p1").textContent="valid Name"
           }
            }
           function validateEmail(){
            let email = document.getElementById("email").value.trim();
            if(email =="" || !email.includes("@")){
                document.getElementById("p2").textContent="Invalid Email"
            }else{
                document.getElementById("p2").textContent="valid Email"
            }
           }
           function validateAge(){
            if(Number(document.getElementById("age").value) <= 18){
                document.getElementById("p3").textContent="Age Must Be Greater than 18"
            }else{
                document.getElementById("p3").textContent="valid Age"
            }
           }
           function validateUser(){
            let fname = document.getElementById("name").value.trim()
            let femail = document.getElementById("email").value.trim()
            let fage = Number(document.getElementById("age").value)
            if(fname !== "" && femail.includes("@") && fage > 18){
                let user = {
                    name:fname,
                    email:femail,
                    age:fage
                };
                sessionStorage.setItem("user", JSON.stringify(user))
                document.getElementById("p4").textContent = "User registered successfully"
            }else{
                document.getElementById("p4").textContent = "Invalid User details"
            }
           }
        </script>
    </body>
</html>
