<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Personal Notes Saver using LocalStorage </title>
    </head>
    <body>
        <h1>Welcome !!!</h1>
        <h3>Start Your Journal Now</h3>
        <label for="userName">Enter UserName to Create Entry : </label>
        <input type="text" name="userName" id="userName" placeholder="Enter Username" required>
        <br><br>
        <textarea name="textbox" id="textbox" rows="10" cols="40" placeholder="Start writing here..."></textarea>
        <p id="response"></p>
        <input type="button" value="Submit" id="submit" onclick="save()">
        <span> </span>
        <input type="button" value="Clear" id="clear" onclick="clear()">
        <br><br>
        <input type="button" value="Get entry" id="getEntry" onclick="getEntry()">
        <script>
            function save(){
                localStorage.setItem(document.getElementById("userName").value
                ,document.getElementById("textbox").value)
                document.getElementById("textbox").value = "";
                document.getElementById("response").textContent = "Submitted Successfully";
            }
            function clear(){
                localStorage.removeItem(document.getElementById("userName").value)
                document.getElementById("textbox").value = "";
                document.getElementById("response").textContent = "Entry Deleted Successfully";
            }
            function getEntry(){
                let entry = localStorage.getItem(document.getElementById("userName").value)
                document.getElementById("textbox").value=entry
                document.getElementById("response").textContent = "Entry Recieved Successfully";
            }
        </script>
    </body>
</html>
