<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Simple Discount Calculator </title>
    </head>
    <body>
        <h2>Simple Discount Calculator</h2>
        <hr>
        <label>Enter the Bill Amount : </label>
        <br>
        <input type="number" id="amount" step="100">
        <br>
        <input type="submit" value="submit" onclick="Disc()">
        <hr>
        <script>
            function Disc(){
                let amount = document.getElementById("amount").value
                let discount = 0;
                if(amount>=5000){
                    discount = amount*0.2;
                }
                else if(amount>=3000){
                    discount = amount*0.1;
                }
                else if(amount<3000){
                    discount=0
                }
                else{
                    console.log("please enter the valid input")
                }
                console.log("discount amount is  : "+discount);
                console.log("total payable is : "+(amount-discount));
            }
        </script>
    </body>
</html>
